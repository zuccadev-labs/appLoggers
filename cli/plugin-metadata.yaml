name: apploggers
version: 0.2.0
description: AppLoggers telemetry CLI for operational queries, health checks, SSE streaming, and AI agent automation
author: devzucca
license: MIT
homepage: https://github.com/zuccadev-labs/appLoggers
repository: https://github.com/zuccadev-labs/appLoggers
documentation: https://github.com/zuccadev-labs/appLoggers/tree/main/docs/ES/cli
entrypoint: apploggers

# Syncbin Universal Contract
syncbin_metadata:
  version: "1.0"
  contract: "POSIX exit codes (0=success, 1=error, 2=usage), structured output (text/json/agent)"

output_modes:
  - text        # Human-readable
  - json        # Strict JSON
  - agent       # TOON compact format (machine-native)

capabilities:
  - syncbin-metadata          # Plugin metadata discovery
  - version                   # CLI version
  - upgrade                   # Self-update to latest release with SHA-256 checksum verification
  - capabilities              # Available commands
  - health                    # Backend readiness probe
  - health-deep               # Deep Supabase connectivity probe with latency
  - agent-schema              # Data schema for agents (contract_version 2.0.0)
  - telemetry-query           # Query logs/metrics with full filter set
  - telemetry-agent-response  # Compact agent-optimized TOON response
  - telemetry-stream          # SSE stream (text/event-stream) for frontend EventSource
  - telemetry-tail            # Follow mode — tail -f equivalent, supports --output json
  - telemetry-stats           # Quick statistical summary: error rate, top tags, by environment — all standard filters

platforms:
  - windows-amd64
  - linux-amd64
  - darwin-amd64      # macOS Intel
  - linux-arm64       # Linux ARM (Raspberry Pi, AWS Graviton)
  - darwin-arm64      # macOS Apple Silicon

dependencies:
  runtime:
    - name: Supabase
      version: "latest"
      required: true
      notes: "PostgreSQL backend for telemetry storage"

config:
  environment_variables:
    required:
      - appLogger_supabaseUrl
      - appLogger_supabaseKey
    optional:
      - appLogger_supabaseSchema
      - appLogger_supabaseLogTable
      - appLogger_supabaseMetricTable
      - appLogger_supabaseTimeoutSeconds
  flags:
    global:
      - name: "--output"
        values: [text, json, agent]
        default: "text"
      - name: "--verbose"
        description: "Enable verbose output"
      - name: "--syncbin-metadata"
        hidden: true
        description: "Print Syncbin metadata"

exit_codes:
  success: 0
  runtime_error: 1
  usage_error: 2

build_info:
  language: Go
  minimum_version: "1.25"
  cicd_system: "GitHub Actions"
  test_framework: "Go testing + integration tests"
  linter: "golangci-lint"
  
release_policy:
  versioning: "Semantic Versioning (v0.1.0-alpha.0+)"
  channels:
    - alpha
    - beta
    - stable
  distribution:
    - GitHub Releases (binaries)
    - JitPack (source)
  platforms_built: 5
  build_time: "~5 minutes (all platforms)"
