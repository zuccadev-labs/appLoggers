run:
  go: '1.25'
  timeout: 5m
  skip-dirs:
    - vendor
    - tests

linters:
  enable:
    - asasalint
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - dogsled
    - dupl
    - dupword
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - forbidigo
    - forcetypeassert
    - funlen
    - gcheckcompilerdirectives
    - gciimports
    - gochecknoglobals
    - gochecknoinits
    - gocognac
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gofmt
    - gofumpt
    - goheader
    - goimports
    - golint
    - gomodguard
    - goprintffuncname
    - gosec
    - gosimple
    - gosmopolitan
    - govet
    - gozxyglobs
    - grouper
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - ireturn
    - isnil
    - lll
    - loggercheck
    - looppointer
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - mockery
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - ructx
    - sloglint
    - slurp
    - spancheck
    - sqlc
    - staticcheck
    - stdlibuintptr
    - stylecheck
    - tagliatelle
    - tenv
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - typecheck
    - unconvert
    - undeclaredname
    - unparam
    - unused
    - usestdlibvars
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl
    - zerologlint
  disable:
    - goerr113       # Too strict for CLI error messages
    - wsl            # Whitespace rules too nitpicky
    - nlreturn       # Conflicts with code organization

  fast: false

issues:
  exclude-use-default: false
  exclude:
    - "G101"  # Audit findings for: password_name
    - "G601"  # Implicit memory aliasing in for loop
  exclude-dirs:
    - vendor
    - node_modules
    - .git

linters-settings:
  cyclop:
    max-complexity: 10

  funlen:
    lines: 60
    statements: 40

  gocognac:
    max-complexity: 10

  gocyclo:
    min-complexity: 10

  golangci-lint-version: 1.59.0

  govet:
    check-shadowing: true

  lll:
    line-length: 120

  tagliatelle:
    case: snake

  varnamelen:
    max-distance: 5
    min-name-length: 2

  ireturn:
    allow:
      - anon
      - error
      - empty
      - stdlib
      - gopkg.in/yaml.v2

  sloglint:
    no-mixed-args: true

  testifylint:
    require-error-is-type: true
    require-error-is-comparison: true
