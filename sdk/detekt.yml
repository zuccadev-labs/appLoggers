build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  CyclomaticComplexMethod:
    threshold: 15
  TooManyFunctions:
    thresholdInFiles: 25
    thresholdInClasses: 20
    thresholdInInterfaces: 15

style:
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '5'
      - '10'
      - '20'
      - '30'
      - '60'
      - '100'
      - '120'
      - '200'
      - '299'
      - '300'
      - '1000'
      - '10000'
      - '60000'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  MaxLineLength:
    maxLineLength: 120
  WildcardImport:
    active: true
    excludeImports:
      - 'kotlinx.coroutines.*'
      - 'com.applogger.core.internal.*'
      - 'com.applogger.core.*'
      - 'com.applogger.core.model.*'
      - 'io.ktor.client.*'
      - 'io.ktor.client.plugins.contentnegotiation.*'
      - 'io.ktor.client.request.*'
      - 'io.ktor.client.statement.*'
      - 'io.ktor.http.*'
      - 'io.ktor.serialization.kotlinx.json.*'
  ReturnCount:
    max: 4
    excludedFunctions: ['equals']
  ForbiddenComment:
    active: false

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*|`.*`'
  MatchingDeclarationName:
    active: false

potential-bugs:
  UnsafeCast:
    active: true
  LateinitUsage:
    active: false

performance:
  SpreadOperator:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Exception'
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  TooGenericExceptionThrown:
    active: true
  SwallowedException:
    active: false
