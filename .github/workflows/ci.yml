name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: ./gradlew :logger-core:jvmTest :logger-test:jvmTest :sample:testDebugUnitTest

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14

      - name: Build
        run: ./gradlew assemble

  e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run E2E Tests against Supabase
        env:
          APPLOGGER_SUPABASE_URL: ${{ secrets.APPLOGGER_SUPABASE_URL }}
          APPLOGGER_SUPABASE_ANON_KEY: ${{ secrets.APPLOGGER_SUPABASE_ANON_KEY }}
          APPLOGGER_SUPABASE_SERVICE_KEY: ${{ secrets.APPLOGGER_SUPABASE_SERVICE_KEY }}
        run: ./gradlew :logger-transport-supabase:jvmTest

      - name: Upload E2E Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14
