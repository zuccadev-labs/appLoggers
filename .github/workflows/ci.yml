name: CI

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

defaults:
  run:
    working-directory: sdk

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: sdk/build/reports/detekt/
          retention-days: 14

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew :logger-core:jvmTest :logger-test:jvmTest :sample:testDebugUnitTest

      - name: Generate Coverage Report
        run: ./gradlew jacocoTestReport

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: 'sdk/**/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml'
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            sdk/**/build/reports/tests/
            sdk/**/build/test-results/
            sdk/**/build/reports/jacoco/
          retention-days: 14

      - name: Build
        run: ./gradlew assemble

  e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run E2E Tests against Supabase
        env:
          appLogger_supabaseUrl: ${{ secrets.APPLOGGER_SUPABASE_URL }}
          APPLOGGER_SUPABASE_URL: ${{ secrets.APPLOGGER_SUPABASE_URL }}
          APPLOGGER_SUPABASE_ANON_KEY: ${{ secrets.APPLOGGER_SUPABASE_ANON_KEY }}
          APPLOGGER_SUPABASE_SERVICE_KEY: ${{ secrets.APPLOGGER_SUPABASE_SERVICE_KEY }}
        run: ./gradlew :logger-transport-supabase:jvmTest

      - name: Upload E2E Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            sdk/**/build/reports/tests/
            sdk/**/build/test-results/
          retention-days: 14

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build for CodeQL
        run: ./gradlew :logger-core:compileKotlinJvm :logger-transport-supabase:compileKotlinJvm
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin

      - name: Dependency Submission
        continue-on-error: true
        uses: mikepenz/gradle-dependency-submission@v1
        with:
          gradle-project-path: sdk
          gradle-build-module: ':logger-core'
          gradle-build-configuration: 'jvmCompileClasspath'
