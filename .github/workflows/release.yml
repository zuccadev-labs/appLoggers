name: Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: sdk

jobs:
  test:
    name: Pre-Release Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Run Unit Tests
        run: ./gradlew :logger-core:jvmTest :logger-test:jvmTest :sample:testDebugUnitTest

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pre-release-test-reports
          path: |
            sdk/**/build/reports/tests/
            sdk/**/build/test-results/
          retention-days: 30

      - name: Build
        run: ./gradlew assemble

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Download CLI dependencies
        working-directory: cli
        run: go mod download

      - name: Run CLI tests
        working-directory: cli
        env:
          appLogger_supabaseUrl: ${{ secrets.APPLOGGER_SUPABASE_URL }}
          appLogger_supabaseKey: ${{ secrets.APPLOGGER_SUPABASE_KEY }}
          APPLOGGER_SUPABASE_URL: ${{ secrets.APPLOGGER_SUPABASE_URL }}
          APPLOGGER_SUPABASE_KEY: ${{ secrets.APPLOGGER_SUPABASE_KEY }}
        run: go test -v -race "-coverprofile=coverage.out" "-covermode=atomic" ./...

      - name: Wait for CI workflow
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflow = 'ci.yml'
            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = process.env.GITHUB_SHA
            let attempts = 0
            while (attempts < 30) {
              const res = await github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id: workflow, per_page: 5, head_sha: sha })
              if (res.data.total_count > 0) {
                const run = res.data.workflow_runs[0]
                core.info(`Found CI run: status=${run.status} conclusion=${run.conclusion}`)
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') { core.info('CI workflow passed'); return }
                  else { core.setFailed(`Required workflow CI concluded with ${run.conclusion}`); return }
                }
              } else {
                core.info('No CI workflow found yet for this SHA')
              }
              await new Promise(r => setTimeout(r, 10000))
              attempts++
            }
            core.setFailed('Timeout waiting for CI workflow to finish')

  publish:
    name: Publish & Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ github.ref_name }}
        run: ./gradlew publish -PVERSION_NAME=${VERSION_NAME#v}

      - name: Generate API Documentation
        run: ./gradlew dokkaHtmlMultiModule

      - name: Upload API Docs
        uses: actions/upload-artifact@v7
        with:
          name: api-docs
          path: sdk/build/dokka/htmlMultiModule/
          retention-days: 90

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
