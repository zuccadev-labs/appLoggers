name: Release SDK

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: sdk

jobs:
  test:
    name: Pre-Release Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Run Unit Tests
        run: ./gradlew :logger-core:jvmTest :logger-test:jvmTest :sample:testDebugUnitTest

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-release-test-reports
          path: |
            sdk/**/build/reports/tests/
            sdk/**/build/test-results/
          retention-days: 30

      - name: Build
        run: ./gradlew assemble

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Download CLI dependencies
        working-directory: cli
        run: go mod download

      - name: Run CLI tests
        working-directory: cli
        env:
          appLogger_supabaseUrl: ${{ secrets.APPLOGGER_SUPABASE_URL }}
          appLogger_supabaseKey: ${{ secrets.APPLOGGER_SUPABASE_KEY }}
          APPLOGGER_SUPABASE_URL: ${{ secrets.APPLOGGER_SUPABASE_URL }}
          APPLOGGER_SUPABASE_KEY: ${{ secrets.APPLOGGER_SUPABASE_KEY }}
        run: go test -v -race "-coverprofile=coverage.out" "-covermode=atomic" ./...

  publish:
    name: Publish & Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Override local JDK path for CI
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate tag against sdk/gradle.properties
        run: |
          SDK_VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2 | tr -d ' \t\r\n')
          EXPECTED_TAG="v${SDK_VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag/version mismatch: got ${GITHUB_REF_NAME}, expected ${EXPECTED_TAG} from sdk/gradle.properties"
            exit 1
          fi

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ github.ref_name }}
        run: ./gradlew publish -PVERSION_NAME=${VERSION_NAME#v}

      - name: Generate API Documentation
        run: ./gradlew dokkaHtmlMultiModule

      - name: Upload API Docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: sdk/build/dokka/htmlMultiModule/
          retention-days: 90

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body_path: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}
