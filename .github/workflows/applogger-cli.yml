name: AppLoggers CLI - Build & Test

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'apploggers-v*'
    paths:
      - 'cli/**'
      - '.github/workflows/applogger-cli.yml'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'cli/**'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.runners }}
    strategy:
      matrix:
        include:
          - os: linux
            runners: ubuntu-latest
            go: 1.24.x
          - os: macos
            runners: macos-latest
            go: 1.24.x
          - os: windows
            runners: windows-latest
            go: 1.24.x
    env:
      GOFLAGS: -mod=readonly
      appLogger_supabaseUrl: ${{ secrets.APPLOGGER_SUPABASE_URL }}
      appLogger_supabaseKey: ${{ secrets.APPLOGGER_SUPABASE_KEY }}
      APPLOGGER_SUPABASE_URL: ${{ secrets.APPLOGGER_SUPABASE_URL }}
      APPLOGGER_SUPABASE_KEY: ${{ secrets.APPLOGGER_SUPABASE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Download dependencies
        working-directory: cli
        run: go mod download

      - name: Run tests with coverage
        working-directory: cli
        run: go test -v -race "-coverprofile=coverage.out" "-covermode=atomic" ./...

      - name: Upload coverage to CodeCov
        if: matrix.os == 'linux'
        uses: codecov/codecov-action@v4
        with:
          files: ./cli/coverage.out
          flags: cli-${{ matrix.os }}
          name: cli-coverage-${{ matrix.os }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: cli
          args: --timeout=5m

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runners }}
    needs: [test, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/apploggers-v'))
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runners: ubuntu-latest
          - os: linux
            arch: arm64
            runners: ubuntu-latest
          - os: darwin
            arch: amd64
            runners: macos-latest
          - os: darwin
            arch: arm64
            runners: macos-latest
          - os: windows
            arch: amd64
            runners: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Set version info
        working-directory: cli
        shell: bash
        run: |
          BASE_VERSION=$(tr -d ' \t\r\n' < VERSION)
          if [[ -z "$BASE_VERSION" ]]; then
            echo "cli/VERSION is empty" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/apploggers-v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="apploggers-v${BASE_VERSION}-dev.${SHORT_SHA}"
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build
        working-directory: cli
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ env.VERSION }} -X main.commit=${{ env.COMMIT }} -X main.date=${{ env.BUILD_TIME }}" \
            -o apploggers-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }} \
            ./cmd/applogger-cli

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: apploggers-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/apploggers-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}
          retention-days: 5

  smoke-linux-artifact:
    name: Smoke Test (Linux artifact)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/apploggers-v'))
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: apploggers-linux-amd64
          path: ./smoke

      - name: Execute smoke checks
        run: |
          chmod +x ./smoke/apploggers-linux-amd64
          ./smoke/apploggers-linux-amd64 version --output json
          ./smoke/apploggers-linux-amd64 --syncbin-metadata --output json
          ./smoke/apploggers-linux-amd64 capabilities --output json

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Install gosec (pinned)
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.2

      - name: Run gosec
        run: |
          "$(go env GOPATH)/bin/gosec" -no-fail ./cli/...

  governance-main:
    name: Governance Gate (main/tag)
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/apploggers-v'))
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: apploggers-linux-amd64
          path: ./governance

      - name: Validate embedded build metadata
        run: |
          chmod +x ./governance/apploggers-linux-amd64
          ./governance/apploggers-linux-amd64 version --output json > version.json
          VERSION_VALUE="$(jq -r '.version' version.json)"
          COMMIT_VALUE="$(jq -r '.commit' version.json)"
          DATE_VALUE="$(jq -r '.date' version.json)"

          if [[ -z "${VERSION_VALUE}" || "${VERSION_VALUE}" == "dev" ]]; then
            echo "Invalid embedded version: ${VERSION_VALUE}" >&2
            exit 1
          fi
          if [[ -z "${COMMIT_VALUE}" || "${COMMIT_VALUE}" == "none" ]]; then
            echo "Invalid embedded commit: ${COMMIT_VALUE}" >&2
            exit 1
          fi
          if [[ -z "${DATE_VALUE}" || "${DATE_VALUE}" == "unknown" ]]; then
            echo "Invalid embedded date: ${DATE_VALUE}" >&2
            exit 1
          fi

  release:
    name: Create Release (on tag)
    runs-on: ubuntu-latest
    needs: [test, lint, build, security, smoke-linux-artifact, governance-main]
    if: startsWith(github.ref, 'refs/tags/apploggers-v')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag against cli/VERSION
        run: |
          BASE_VERSION=$(tr -d ' \t\r\n' < cli/VERSION)
          EXPECTED_TAG="apploggers-v${BASE_VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag/version mismatch: got ${GITHUB_REF_NAME}, expected ${EXPECTED_TAG} from cli/VERSION"
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for file in */*; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Generate package manager manifests
        run: |
          VERSION="${GITHUB_REF_NAME#apploggers-v}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          DOWNLOAD_BASE="${REPO_URL}/releases/download/${GITHUB_REF_NAME}"

          DARWIN_AMD64_SHA="$(cut -d' ' -f1 artifacts/apploggers-darwin-amd64/apploggers-darwin-amd64.sha256)"
          DARWIN_ARM64_SHA="$(cut -d' ' -f1 artifacts/apploggers-darwin-arm64/apploggers-darwin-arm64.sha256)"
          WINDOWS_AMD64_SHA="$(cut -d' ' -f1 artifacts/apploggers-windows-amd64/apploggers-windows-amd64.exe.sha256)"

          mkdir -p artifacts/manifests/homebrew
          mkdir -p artifacts/manifests/scoop
          mkdir -p artifacts/manifests/winget

          cat > artifacts/manifests/homebrew/apploggers.rb <<EOF
          class Apploggers < Formula
            desc "AppLoggers telemetry CLI"
            homepage "${REPO_URL}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${DOWNLOAD_BASE}/apploggers-darwin-arm64"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${DOWNLOAD_BASE}/apploggers-darwin-amd64"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "apploggers-darwin-arm64" => "apploggers"
              else
                bin.install "apploggers-darwin-amd64" => "apploggers"
              end
            end

            test do
              assert_match "apploggers", shell_output("#{bin}/apploggers version --output text")
            end
          end
          EOF

          cat > artifacts/manifests/scoop/apploggers.json <<EOF
          {
            "version": "${VERSION}",
            "description": "AppLoggers telemetry CLI",
            "homepage": "${REPO_URL}",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "${DOWNLOAD_BASE}/apploggers-windows-amd64.exe",
                "hash": "${WINDOWS_AMD64_SHA}"
              }
            },
            "bin": "apploggers-windows-amd64.exe",
            "checkver": {
              "github": "zuccadev-labs/appLoggers"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "${DOWNLOAD_BASE}/apploggers-windows-amd64.exe"
                }
              }
            }
          }
          EOF

          cat > artifacts/manifests/winget/DevZucca.AppLoggers.yaml <<EOF
          PackageIdentifier: DevZucca.AppLoggers
          PackageVersion: ${VERSION}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          cat > artifacts/manifests/winget/DevZucca.AppLoggers.locale.en-US.yaml <<EOF
          PackageIdentifier: DevZucca.AppLoggers
          PackageVersion: ${VERSION}
          PackageLocale: en-US
          Publisher: DevZucca
          PackageName: AppLoggers CLI
          License: MIT
          ShortDescription: AppLoggers telemetry CLI
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          EOF

          cat > artifacts/manifests/winget/DevZucca.AppLoggers.installer.yaml <<EOF
          PackageIdentifier: DevZucca.AppLoggers
          PackageVersion: ${VERSION}
          Installers:
            - Architecture: x64
              InstallerType: portable
              InstallerUrl: ${DOWNLOAD_BASE}/apploggers-windows-amd64.exe
              InstallerSha256: ${WINDOWS_AMD64_SHA}
              Commands:
                - apploggers
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    name: Publish Homebrew Tap
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/apploggers-v') && vars.HOMEBREW_TAP_REPO != ''
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Download build artifacts
        if: env.TAP_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Build Homebrew formula
        if: env.TAP_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#apploggers-v}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          DOWNLOAD_BASE="${REPO_URL}/releases/download/${GITHUB_REF_NAME}"
          DARWIN_AMD64_SHA="$(sha256sum artifacts/apploggers-darwin-amd64/apploggers-darwin-amd64 | cut -d' ' -f1)"
          DARWIN_ARM64_SHA="$(sha256sum artifacts/apploggers-darwin-arm64/apploggers-darwin-arm64 | cut -d' ' -f1)"

          cat > apploggers.rb <<EOF
          class Apploggers < Formula
            desc "AppLoggers telemetry CLI"
            homepage "${REPO_URL}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${DOWNLOAD_BASE}/apploggers-darwin-arm64"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${DOWNLOAD_BASE}/apploggers-darwin-amd64"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "apploggers-darwin-arm64" => "apploggers"
              else
                bin.install "apploggers-darwin-amd64" => "apploggers"
              end
            end
          end
          EOF

      - name: Push formula to tap repository
        if: env.TAP_TOKEN != ''
        env:
          TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp apploggers.rb tap/Formula/apploggers.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/apploggers.rb
          git commit -m "chore: publish apploggers ${GITHUB_REF_NAME}" || echo "No formula changes"
          git push origin HEAD:main

  publish-scoop:
    name: Publish Scoop Bucket
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/apploggers-v') && vars.SCOOP_BUCKET_REPO != ''
    env:
      SCOOP_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
    steps:
      - name: Download build artifacts
        if: env.SCOOP_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Build Scoop manifest
        if: env.SCOOP_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#apploggers-v}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          DOWNLOAD_BASE="${REPO_URL}/releases/download/${GITHUB_REF_NAME}"
          WINDOWS_AMD64_SHA="$(sha256sum artifacts/apploggers-windows-amd64/apploggers-windows-amd64.exe | cut -d' ' -f1)"

          cat > apploggers.json <<EOF
          {
            "version": "${VERSION}",
            "description": "AppLoggers telemetry CLI",
            "homepage": "${REPO_URL}",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "${DOWNLOAD_BASE}/apploggers-windows-amd64.exe",
                "hash": "${WINDOWS_AMD64_SHA}"
              }
            },
            "bin": "apploggers-windows-amd64.exe"
          }
          EOF

      - name: Push manifest to scoop bucket
        if: env.SCOOP_TOKEN != ''
        env:
          SCOOP_REPO: ${{ vars.SCOOP_BUCKET_REPO }}
        run: |
          git clone "https://x-access-token:${SCOOP_TOKEN}@github.com/${SCOOP_REPO}.git" scoop
          cp apploggers.json scoop/apploggers.json
          cd scoop
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apploggers.json
          git commit -m "chore: publish apploggers ${GITHUB_REF_NAME}" || echo "No scoop changes"
          git push origin HEAD:main

  publish-winget:
    name: Publish Winget Manifests
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/apploggers-v') && vars.WINGET_REPO != ''
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_REPO_TOKEN }}
    steps:
      - name: Download build artifacts
        if: env.WINGET_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Build Winget manifests
        if: env.WINGET_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#apploggers-v}"
          DOWNLOAD_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          WINDOWS_AMD64_SHA="$(sha256sum artifacts/apploggers-windows-amd64/apploggers-windows-amd64.exe | cut -d' ' -f1)"

          mkdir -p winget/DevZucca/AppLoggers/${VERSION}

          cat > winget/DevZucca/AppLoggers/${VERSION}/DevZucca.AppLoggers.yaml <<EOF
          PackageIdentifier: DevZucca.AppLoggers
          PackageVersion: ${VERSION}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          EOF

          cat > winget/DevZucca/AppLoggers/${VERSION}/DevZucca.AppLoggers.locale.en-US.yaml <<EOF
          PackageIdentifier: DevZucca.AppLoggers
          PackageVersion: ${VERSION}
          PackageLocale: en-US
          Publisher: DevZucca
          PackageName: AppLoggers CLI
          License: MIT
          ShortDescription: AppLoggers telemetry CLI
          ManifestType: defaultLocale
          ManifestVersion: 1.6.0
          EOF

          cat > winget/DevZucca/AppLoggers/${VERSION}/DevZucca.AppLoggers.installer.yaml <<EOF
          PackageIdentifier: DevZucca.AppLoggers
          PackageVersion: ${VERSION}
          Installers:
            - Architecture: x64
              InstallerType: portable
              InstallerUrl: ${DOWNLOAD_BASE}/apploggers-windows-amd64.exe
              InstallerSha256: ${WINDOWS_AMD64_SHA}
              Commands:
                - apploggers
          ManifestType: installer
          ManifestVersion: 1.6.0
          EOF

      - name: Push manifests to winget repo
        if: env.WINGET_TOKEN != ''
        env:
          WINGET_REPO: ${{ vars.WINGET_REPO }}
        run: |
          git clone "https://x-access-token:${WINGET_TOKEN}@github.com/${WINGET_REPO}.git" winget-repo
          mkdir -p "winget-repo/manifests/d/DevZucca/AppLoggers"
          cp -R winget/DevZucca/AppLoggers/* "winget-repo/manifests/d/DevZucca/AppLoggers/"
          cd winget-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/d/DevZucca/AppLoggers
          git commit -m "chore: publish apploggers ${GITHUB_REF_NAME}" || echo "No winget changes"
          git push origin HEAD:main
